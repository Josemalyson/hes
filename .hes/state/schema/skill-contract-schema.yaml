name: skill-contract-schema
version: 1.0.0

type: yaml-schema
description: Schema for HES v3.4 skill contracts

required:
  - name
  - version
  - type

properties:
  name:
    type: string
    pattern: "^[a-z0-9-]+$"
    description: Unique skill identifier

  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: Semantic version

  type:
    type: string
    enum: [orchestrator, system, feature, utility]
    description: Skill type

  description:
    type: string
    description: Human-readable description

  preconditions:
    type: array
    items:
      type: string
    description: Conditions that must be true before execution

  postconditions:
    type: array
    items:
      type: string
    description: Conditions that must be true after execution

  produces:
    type: array
    items:
      type: string
    description: Files/artifacts produced by this skill

  requires:
    type: array
    items:
      type: string
    description: Resources required for execution

  context:
    type: object
    properties:
      include:
        type: array
        items:
          type: string
        description: Files to include in context
      exclude:
        type: array
        items:
          type: string
        description: Files to exclude from context

  gates:
    type: object
    description: Phase transition gates
    additionalProperties:
      type: string

  metadata:
    type: object
    description: Additional metadata
